<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>I Miss You</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
text-align:center;
color:white;
}

.container{
background:rgba(0,0,0,0.4);
padding:40px;
border-radius:20px;
}

img{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
margin-bottom:20px;
border:4px solid white;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4b5c;
color:white;
cursor:pointer;
margin-top:20px;
}

#typing{
font-size:22px;
margin-top:20px;
height:30px;
}

.heart{
position:absolute;
color:red;
font-size:20px;
animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

</style>
</head>

<body>

<div class="container">

<img src="Telly.jpeg">

<h2>I Miss You ❤️</h2>

<div id="typing"></div>

<button onclick="startLove()">Click Here 💌</button>

</div>

<audio id="bgm" loop>
<source src="K:\Miss\music.mpeg">
</audio>

<script>

var message="Every moment without you feels empty... I really miss you 💖";
var i=0;

function startLove(){

document.getElementById("bgm").play();

typeWriter();

setInterval(createHeart,300);

}

function typeWriter(){

if(i < message.length){

document.getElementById("typing").innerHTML += message.charAt(i);

i++;

setTimeout(typeWriter,70);

}

}

function createHeart(){

var heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=Math.random()*20+10+"px";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},5000);

}

</script>

</body>
</html>
